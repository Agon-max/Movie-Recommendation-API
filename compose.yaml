services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: moviesdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "59414:5432"

  movies-api:
    build: .
    ports:
      - "8081:9290"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/moviesdb
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: pass
